{% extends 'base.html' %}

{% block content %}
<h1>Edit Lead</h1>

<form method="POST">
  <div class="mb-3">
    <label class="form-label">Name</label>
    <input name="name" class="form-control" value="{{ lead.name }}" required>
  </div>

  <div class="mb-3">
    <label class="form-label">Email</label>
    <input name="email" type="email" class="form-control" value="{{ lead.email }}" required>
  </div>

  <div class="mb-3">
    <label class="form-label">Company</label>
    <input name="company" class="form-control" value="{{ lead.company }}" required>
  </div>

  <div class="mb-3">
    <label class="form-label">Deal Value</label>
    <input name="value" class="form-control" value="{{ lead.value }}" required>
  </div>

  <div class="mb-3">
    <label class="form-label">Source</label>
    <input name="source" class="form-control" value="{{ lead.source }}" required>
  </div>

  <div class="mb-3">
    <label class="form-label">Status</label>
    {% set current = lead.status %}
    <select name="status" class="form-select">
      <option value="new" {{ 'selected' if current=='new' else '' }}>new</option>
      <option value="contacted" {{ 'selected' if current=='contacted' else '' }}>contacted</option>
      <option value="qualified" {{ 'selected' if current=='qualified' else '' }}>qualified</option>
      <option value="lost" {{ 'selected' if current=='lost' else '' }}>lost</option>
    </select>
  </div>

  <button type="submit" class="btn btn-primary">Save</button>
  <a href="{{ url_for('lead_detail', lead_id=lead.id) }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}

{% extends 'base.html' %}

{% block content %}
<h1>Add Contact for {{ customer.name }}</h1>

<form method="POST">
    <div class="mb-3">
        <label class="form-label">Type</label>
        <select name="contact_type" class="form-control" required>
            <option value="call">Call</option>
            <option value="email">Email</option>
            <option value="meeting">Meeting</option>
            <option value="note">Note</option>
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label">Notes</label>
        <textarea name="notes" class="form-control" required></textarea>
    </div>

    <button type="submit" class="btn btn-primary">Save</button>
    <a href="{{ url_for('customer_detail', customer_id=customer.id) }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}

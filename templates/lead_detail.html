{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="card shadow-sm">
        <div class="card-body">
            <h1 class="mb-3">{{ lead.name }}</h1>

            <p><strong>Email:</strong> {{ lead.email }}</p>
            <p><strong>Company:</strong> {{ lead.company }}</p>
            <p><strong>Value:</strong> {{ lead.value }}</p>
            <p><strong>Source:</strong> {{ lead.source }}</p>
            <p><strong>Status:</strong> {{ lead.status }}</p>

            <div class="mt-3">
                <a href="{{ url_for('edit_lead', lead_id=lead.id) }}" class="btn btn-primary">Edit</a>

                {% if current_user.role == "admin" %}
                <form method="POST"
                      action="{{ url_for('delete_lead', lead_id=lead.id) }}"
                      style="display:inline;">
                    <button type="submit"
                            class="btn btn-danger"
                            onclick="return confirm('Delete this lead?')">
                        Delete
                    </button>
                </form>
                {% endif %}

                <a href="{{ url_for('leads') }}" class="btn btn-secondary">Back</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

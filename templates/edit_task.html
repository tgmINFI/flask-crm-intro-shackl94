{% extends 'base.html' %}
{% block content %}
<h1>Edit Task{% if customer %} for {{ customer.name }}{% endif %}</h1>

<form method="POST">
  <div class="mb-3">
    <label class="form-label">Title</label>
    <input class="form-control" name="title" value="{{ task.title }}" required>
  </div>

  <div class="mb-3">
    <label class="form-label">Due date</label>
    <input class="form-control" name="due_date" value="{{ task.due_date }}">
  </div>

  <div class="mb-3">
    <label class="form-label">Description</label>
    <textarea class="form-control" name="description">{{ task.description }}</textarea>
  </div>

  <div class="mb-3">
    <label class="form-label">Status</label>
    <select class="form-control" name="status">
      <option value="open" {% if task.status=='open' %}selected{% endif %}>open</option>
      <option value="done" {% if task.status=='done' %}selected{% endif %}>done</option>
    </select>
  </div>

  <button class="btn btn-primary" type="submit">Save</button>
  <a class="btn btn-secondary" href="{{ url_for('tasks_for_customer', customer_id=task.customer_id) }}">Cancel</a>
</form>
{% endblock %}

{% extends 'base.html' %}

{% block content %}
<h1>Sales Leads</h1>

<p>
    <a href="{{ url_for('add_lead') }}" class="btn btn-primary">+ Add Lead</a>
</p>

<table class="table table-striped">
    <thead>
        <tr>
            <th>Name</th>
            <th>Company</th>
            <th>Value</th>
            <th>Source</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
    {% for l in leads %}
        <tr>
            <td>{{ l.name }}</td>
            <td>{{ l.company }}</td>
            <td>{{ l.value }}</td>
            <td>{{ l.source }}</td>
            <td>{{ l.status }}</td>
            <td>
                <a href="{{ url_for('lead_detail', lead_id=l.id) }}" class="btn btn-sm btn-primary">View</a>
                <a href="{{ url_for('edit_lead', lead_id=l.id) }}" class="btn btn-sm btn-secondary">Edit</a>

                {% if current_user.role == "admin" %}
                <form method="POST"
                      action="{{ url_for('delete_lead', lead_id=l.id) }}"
                      style="display:inline;">
                    <button type="submit"
                            class="btn btn-sm btn-danger"
                            onclick="return confirm('Delete this lead?')">
                        Delete
                    </button>
                </form>
                {% endif %}
            </td>
        </tr>
    {% endfor %}
    </tbody>
</table>
{% endblock %}
